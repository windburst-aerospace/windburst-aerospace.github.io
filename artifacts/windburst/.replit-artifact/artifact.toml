kind = "web"
previewPath = "/"
title = "Windburst Aerospace"
version = "1.0.0"
id = "artifacts/windburst"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23193

[services.development]
run = "pnpm --filter @workspace/windburst run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/windburst", "run", "build" ]
publicDir = "artifacts/windburst/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23193"
BASE_PATH = "/"
